<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarineCalc — prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Sans+KR:wght@400;500&family=IBM+Plex+Sans+JP:wght@400;500&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --page:#FFFFFF;
  --panel:#F4F6F4;
  --ink:#102A3D;
  --ink-soft:#4C6572;
  --line:#D7DEDE;
  --line-strong:#AFC0C2;
  --brass:#A9722F;
  --brass-bg:#F2E4CF;
  --signal:#2F8F5B;
  --signal-bg:#E4F2E9;
  --font-display:'Oswald','IBM Plex Sans KR','IBM Plex Sans JP',sans-serif;
  --font-body:'IBM Plex Sans','IBM Plex Sans KR','IBM Plex Sans JP',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--page);color:var(--ink);font-family:var(--font-body);}
.wrap{max-width:960px;margin:0 auto;padding:0 24px 80px;}
header{padding:20px 0 0;border-bottom:1px solid var(--line);}
.headbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding-bottom:16px;}
.wordmark{font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:2px;color:var(--ink);}
.wordmark span{color:var(--brass);}
.controls{display:flex;gap:8px;align-items:center;}
.pillgroup{display:flex;border:1px solid var(--line-strong);border-radius:6px;overflow:hidden;}
.pillgroup button{
  background:var(--page);border:none;color:var(--ink-soft);
  font-family:var(--font-body);font-size:12px;font-weight:500;
  padding:7px 12px;cursor:pointer;letter-spacing:0.5px;
}
.pillgroup button.active{background:var(--brass);color:#fff;}
.hero{padding:48px 0 36px;text-align:center;}
.hero h1{font-family:var(--font-display);font-weight:600;font-size:32px;color:var(--ink);margin:0 0 12px;letter-spacing:0.3px;}
.hero p{color:var(--ink-soft);font-size:15px;max-width:520px;margin:0 auto 8px;line-height:1.6;}
.hero .note{font-size:12px;color:var(--brass);margin-top:14px;}
.hull-svg{margin:0 auto 8px;display:block;}
.section-label{
  font-family:var(--font-mono);font-size:11px;letter-spacing:2px;
  color:var(--brass);text-transform:uppercase;margin:0 0 14px;
}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:56px;}
.card{
  border:1px solid var(--line);border-radius:6px;padding:16px;
  background:var(--panel);cursor:pointer;transition:border-color 0.15s;
}
.card:hover{border-color:var(--brass);}
.card .cat{font-family:var(--font-mono);font-size:10px;color:var(--brass);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.card .name{font-size:14px;font-weight:500;color:var(--ink);}
.card .tag{
  display:inline-block;margin-top:10px;font-size:10px;
  padding:2px 8px;border-radius:10px;font-family:var(--font-mono);letter-spacing:0.5px;
  background:var(--signal-bg);color:var(--signal);
}
.calc{
  background:var(--panel);border:1px solid var(--line);border-radius:8px;
  padding:24px;margin-bottom:24px;
}
.calc h2{font-family:var(--font-display);font-weight:600;font-size:19px;color:var(--ink);margin:0 0 4px;}
.calc .desc{font-size:13px;color:var(--ink-soft);margin:0 0 20px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:5px;}
.field select, .field input{
  width:100%;background:#fff;border:1px solid var(--line-strong);color:var(--ink);
  font-family:var(--font-body);font-size:14px;padding:9px 10px;border-radius:4px;
}
.field select:focus, .field input:focus{outline:none;border-color:var(--brass);}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.plate{
  margin-top:18px;background:#fff;border:1px solid var(--brass);border-radius:6px;
  padding:16px 18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;
}
.plate .item{text-align:left;}
.plate .item .l{font-size:10px;color:var(--brass);font-family:var(--font-mono);letter-spacing:1px;text-transform:uppercase;}
.plate .item .v{font-family:var(--font-mono);font-size:20px;color:var(--ink);font-weight:600;margin-top:2px;}
.hint{font-size:12px;color:var(--ink-soft);margin-top:10px;}
table.ref{width:100%;border-collapse:collapse;margin-top:6px;font-size:13px;}
table.ref th, table.ref td{border:1px solid var(--line);padding:6px 8px;text-align:left;}
table.ref th{background:#fff;color:var(--ink-soft);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;}
footer{text-align:center;padding-top:20px;border-top:1px solid var(--line);}
footer p{font-size:12px;color:var(--ink-soft);}
.hub{background:var(--panel);border:1px solid var(--brass);border-radius:8px;padding:22px 24px;margin-bottom:32px;}
.hub h2{font-family:var(--font-display);font-weight:600;font-size:18px;color:var(--ink);margin:0 0 4px;}
.hub .desc{font-size:13px;color:var(--ink-soft);margin:0 0 16px;}
.hubtabs{display:flex;gap:8px;margin-bottom:16px;}
.hubtabs button{
  background:#fff;border:1px solid var(--line-strong);color:var(--ink-soft);
  font-family:var(--font-body);font-size:13px;font-weight:500;padding:8px 14px;
  border-radius:6px;cursor:pointer;
}
.hubtabs button.active{background:var(--brass);color:#fff;border-color:var(--brass);}
.dropzone{
  border:2px dashed var(--line-strong);border-radius:8px;padding:32px 16px;text-align:center;
  cursor:pointer;background:#fff;
}
.dropzone.drag{border-color:var(--brass);background:var(--brass-bg);}
.dropzone p{margin:0;font-size:13px;color:var(--ink-soft);}
.badge{
  display:inline-block;font-size:10px;font-family:var(--font-mono);letter-spacing:0.5px;
  padding:2px 8px;border-radius:10px;background:var(--brass-bg);color:var(--brass);margin-left:8px;
}
.applybar{display:flex;justify-content:flex-end;margin-top:14px;}
.btn-brass{
  background:var(--brass);color:#fff;border:none;border-radius:6px;
  font-family:var(--font-body);font-size:13px;font-weight:500;padding:9px 18px;cursor:pointer;
}
.applied-msg{font-size:12px;color:var(--signal);margin-top:10px;text-align:right;}
#calcSearch{
  width:100%;background:#fff;border:1px solid var(--line-strong);color:var(--ink);
  font-family:var(--font-body);font-size:14px;padding:10px 12px;border-radius:6px;margin-bottom:14px;
}
#calcSearch:focus{outline:none;border-color:var(--brass);}
.adslot{
  border:1px dashed var(--line-strong);border-radius:6px;padding:14px;margin:20px 0;
  text-align:center;font-family:var(--font-mono);font-size:11px;letter-spacing:1px;
  color:var(--ink-soft);text-transform:uppercase;background:var(--panel);
}
.card.hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="headbar">
    <div class="wordmark">MARINE<span>CALC</span></div>
    <div class="controls">
      <div class="pillgroup" id="langGroup">
        <button data-lang="ko" class="active">KO</button>
        <button data-lang="en">EN</button>
        <button data-lang="ja">JA</button>
      </div>
      <div class="pillgroup" id="unitGroup">
        <button data-unit="metric" class="active" data-i18n="unit_metric">Metric</button>
        <button data-unit="imperial" data-i18n="unit_imperial">Imperial</button>
      </div>
    </div>
  </div>
</header>

<section class="hero">
  <svg class="hull-svg" width="360" height="70" viewBox="0 0 360 70">
    <line x1="0" y1="50" x2="360" y2="50" stroke="#AFC0C2" stroke-width="1" stroke-dasharray="4 4"/>
    <path d="M20,48 L40,20 L280,20 Q320,20 340,48 L20,48 Z" fill="none" stroke="#102A3D" stroke-width="1.5"/>
    <line x1="70" y1="20" x2="70" y2="48" stroke="#102A3D" stroke-width="0.75" opacity="0.35"/>
    <line x1="140" y1="20" x2="140" y2="48" stroke="#102A3D" stroke-width="0.75" opacity="0.35"/>
    <line x1="210" y1="20" x2="210" y2="48" stroke="#102A3D" stroke-width="0.75" opacity="0.35"/>
    <line x1="280" y1="20" x2="280" y2="48" stroke="#102A3D" stroke-width="0.75" opacity="0.35"/>
  </svg>
  <h1 data-i18n="hero_title">해양 실무 계산기 모음</h1>
  <p data-i18n="hero_sub">톤수, 도장, 복합소재, 배관 규격까지. 조선/보트제작 실무자를 위한 계산 도구입니다.</p>
  <p class="note" data-i18n="hero_note">프로토타입 — 계산기는 계속 추가됩니다</p>
</section>

<div class="adslot" data-i18n="ad_placeholder">AD SLOT — hero banner</div>

<div id="hubArea"></div>

<p class="section-label" data-i18n="label_calculators">CALCULATORS</p>
<input type="text" id="calcSearch" data-i18n-placeholder="search_placeholder" placeholder="계산기 검색 (예: 톤수, 페인트, 파이프)">
<div class="grid" id="calcGrid"></div>

<div class="adslot" data-i18n="ad_placeholder2">AD SLOT — between grid and results</div>

<div id="calcArea"></div>

<div class="adslot" data-i18n="ad_placeholder3">AD SLOT — footer banner</div>

<footer>

  <p data-i18n="footer_note">본 계산 결과는 참고용이며, 공식 서류를 대체하지 않습니다.</p>
</footer>

</div>

let lang = "ko";
let unit = "metric";

function t(key){ return i18n[lang][key] || key; }

function applyI18n(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.textContent = t(el.getAttribute("data-i18n"));
  });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el=>{
    el.placeholder = t(el.getAttribute("data-i18n-placeholder"));
  });
  renderHub();
  renderGrid();
  renderTonnage(); renderPaint(); renderMetal(); renderDraft(); renderSpeed();
  renderVoyage(); renderComposite(); renderPipe(); renderProp(); renderWood(); renderAnchor(); renderConvert();
  setupSearch();
}

function setupSearch(){
  const input = document.getElementById("calcSearch");
  if(!input) return;
  input.value = "";
  input.oninput = ()=>{
    const q = input.value.trim().toLowerCase();
    document.querySelectorAll("#calcGrid .card").forEach(card=>{
      const text = card.textContent.toLowerCase();
      card.classList.toggle("hidden", q!=="" && !text.includes(q));
    });
  };
}

document.getElementById("langGroup").addEventListener("click", e=>{
  const btn = e.target.closest("button"); if(!btn) return;
  lang = btn.getAttribute("data-lang");
  document.querySelectorAll("#langGroup button").forEach(b=>b.classList.toggle("active", b===btn));
  applyI18n();
});
document.getElementById("unitGroup").addEventListener("click", e=>{
  const btn = e.target.closest("button"); if(!btn) return;
  unit = btn.getAttribute("data-unit");
  document.querySelectorAll("#unitGroup button").forEach(b=>b.classList.toggle("active", b===btn));
  applyI18n();
});

function renderGrid(){
  const grid = document.getElementById("calcGrid");
  let html = "";
  CALC_LIST.forEach(([cat,name,anchor])=>{
    html += `<div class="card" onclick="document.getElementById('${anchor}').scrollIntoView({behavior:'smooth'})">
      <div class="cat">${t(cat)}</div><div class="name">${t(name)}</div>
      <div class="tag">${t("live")}</div></div>`;
  });
  grid.innerHTML = html;
}

function fieldNum(id, label, value, step){
  return `<div class="field"><label>${label}</label><input type="number" id="${id}" value="${value}" step="${step||"0.1"}"></div>`;
}
function replaceCalc(id, newEl){
  const area = document.getElementById("calcArea");
  const existing = document.getElementById(id);
  if(existing){ area.replaceChild(newEl, existing); } else { area.appendChild(newEl); }
}

function computeTonnage(){
  const s = state.t;
  const S = s.type==="sail"?0.5:(s.type==="barge"?0.84:0.67);
  const mult = s.hull==="cat"?2:1;
  const grt = (mult*S*s.l*s.b*s.d)/100;
  const M = s.type==="sail"?0.9:0.8;
  const nrt = grt*M;
  document.getElementById("t_grt_out").textContent = grt.toFixed(1);
  document.getElementById("t_nrt_out").textContent = nrt.toFixed(1);
}

const PAINT_SCHEMES = {
  bottom: [
    {key:"epoxyBarrier", nameKey:"step_epoxyBarrier", coats:3, coverage:5},
    {key:"antifouling", nameKey:"step_antifouling", coats:2, coverage:9}
  ],
  topside: [
    {key:"epoxyPrimer", nameKey:"step_epoxyPrimer", coats:2, coverage:8},
    {key:"highbuild", nameKey:"step_highbuild", coats:1, coverage:4, optional:true},
    {key:"urethane", nameKey:"step_urethane", coats:2, coverage:10}
  ]
};
function paintAreaValue(area){
  const s = state.p;
  if(area==="bottom"){
    const C = s.hull==="sail"?0.7:(s.hull==="cat"?0.65:0.75);
    return s.lwl*s.beam*s.draft*C;
  }
  if(area==="hull"){ return 2*s.lwl*s.freeboardH*s.curve; }
  if(area==="freeboard"){ return 2*s.lwl*s.stripeH; }
  return s.superArea;
}
function paintSchemeFor(area){ return area==="bottom" ? PAINT_SCHEMES.bottom : PAINT_SCHEMES.topside; }

function renderPaint(){

  const highbuildToggle = s.area==="hull" || s.area==="freeboard" || s.area==="super" ? `

  el.innerHTML = `
  <div class="calc" id="calc-paint">

    <div class="row2">
      <div class="field"><label>${t("p_hull")}</label>
        <select id="p_hull"><option value="sail" ${s.hull==="sail"?"selected":""}>Sailboat</option><option value="power" ${s.hull==="power"?"selected":""}>Powerboat</option><option value="cat" ${s.hull==="cat"?"selected":""}>Catamaran</option></select></div>
      <div class="field"><label>${t("p_area")}</label>
        <select id="p_area">
          <option value="bottom" ${s.area==="bottom"?"selected":""}>${t("p_area_bottom")}</option>
          <option value="hull" ${s.area==="hull"?"selected":""}>${t("p_area_hull")}</option>
          <option value="freeboard" ${s.area==="freeboard"?"selected":""}>${t("p_area_freeboard")}</option>
          <option value="super" ${s.area==="super"?"selected":""}>${t("p_area_super")}</option>
        </select></div>
    </div>
    ${dimFields}
    ${highbuildToggle}
    <table class="ref" id="p_steps"></table>
    <div class="plate"><div class="item"><div class="l">${t("p_total")}</div><div class="v" id="p_total_out">--</div></div></div>
  </div>`;
  replaceCalc("calc-paint", el.firstElementChild);
  document.getElementById("p_hull").onchange = e=>{ s.hull=e.target.value; computePaint(); };
  document.getElementById("p_area").onchange = e=>{ s.area=e.target.value; renderPaint(); };

  bindLen("p_lwl","lwl"); bindLen("p_beam","beam"); bindLen("p_draft","draft");
  bindLen("p_freeboardH","freeboardH"); bindLen("p_stripeH","stripeH");
  const curveEl = document.getElementById("p_curve"); if(curveEl) curveEl.oninput = e=>{ s.curve=parseFloat(e.target.value)||0; computePaint(); };
  const superEl = document.getElementById("p_superArea"); if(superEl) superEl.oninput = e=>{ s.superArea=parseFloat(e.target.value)||0; computePaint(); };
  const hbEl = document.getElementById("p_includeHighbuild"); if(hbEl) hbEl.onchange = e=>{ s.includeHighbuild=e.target.checked; computePaint(); };
  computePaint();
}
function computePaint(){
  const s = state.p;
  const area = paintAreaValue(s.area);
  const scheme = paintSchemeFor(s.area);
  const stepsTable = document.getElementById("p_steps");
  let rows = `<tr><th>${t("p_step")}</th><th>${t("p_coats")}</th><th>${t("p_coverage")}</th><th>${t("p_liters")}</th></tr>`;
  let total = 0;
  scheme.forEach(step=>{
    if(step.optional && !s.includeHighbuild) return;
    const liters = (area*step.coats)/step.coverage;
    total += liters;
    rows += `<tr><td>${t(step.nameKey)}</td><td>${step.coats}</td><td>${step.coverage}</td><td>${lToDisp(liters).toFixed(1)} ${lUnitLabel()}</td></tr>`;
  });
  stepsTable.innerHTML = rows;
  document.getElementById("p_total_out").textContent = lToDisp(total).toFixed(1) + " " + lUnitLabel();
}

    bind("v_battCap","battCap"); bind("v_battDraw","battDraw"); bind("v_elecPrice","elecPrice");
  } else {
    const modeEl = document.getElementById("v_rateMode"); if(modeEl) modeEl.onchange = e=>{ s.rateMode=e.target.value; renderVoyage(); };
    bind("v_rate","rate"); bind("v_price","price"); bind("v_admiralty","admiralty");
  }
  bind("v_loa","loa"); bind("v_beamRef","beam"); bind("v_draftRef","draft"); bind("v_dispRef","dispRef");
  computeVoyage();
}
function computeVoyage(){
  const s = state.v;
  const time = s.speed>0 ? s.dist/s.speed : 0;
  let fuelOrEnergy = 0, cost = 0, warn = "";
  if(s.engine==="battery"){
    fuelOrEnergy = time*s.battDraw;
    cost = fuelOrEnergy*s.elecPrice;
    if(fuelOrEnergy > s.battCap) warn = t("v_warnBatt");
    document.getElementById("v_fuel_out").textContent = fuelOrEnergy.toFixed(1) + " kWh";
  } else {
    let rate = s.rate;
    if(s.rateMode==="est"){
      const shp = s.admiralty>0 ? Math.pow(s.dispRef,2/3)*Math.pow(s.speed,3)/s.admiralty : 0;
      const powerKw = shp*0.7457;
      const sfc = s.engine==="gasoline" ? 0.28 : 0.21;
      const density = s.engine==="gasoline" ? 0.74 : 0.85;
      rate = (powerKw*sfc)/density;
    }
    fuelOrEnergy = time*rate;
    cost = fuelOrEnergy*s.price;
    document.getElementById("v_fuel_out").textContent = lToDisp(fuelOrEnergy).toFixed(0) + " " + lUnitLabel();
  }
  document.getElementById("v_time_out").textContent = time.toFixed(1) + " hr";
  document.getElementById("v_cost_out").textContent = cost.toLocaleString();
  document.getElementById("v_warn").textContent = warn;
}

function renderComposite(){
  const s = state.c;
  const el = document.createElement("div");
  el.innerHTML = `
  <div class="calc" id="calc-composite">
    <h2>${t("c_title")}</h2>
    <p class="desc">${t("c_desc")}</p>
    <div class="field"><label>${t("c_fiber")}</label>
      <select id="c_fiber">
        <option value="csm" ${s.fiber==="csm"?"selected":""}>Chopped Strand Mat</option>
        <option value="plain" ${s.fiber==="plain"?"selected":""}>Plain Weave</option>
        <option value="biaxial" ${s.fiber==="biaxial"?"selected":""}>Biaxial</option>
        <option value="roving" ${s.fiber==="roving"?"selected":""}>Woven Roving</option>
      </select></div>
    <div class="row3">
      ${fieldNum("c_l", t("c_length")+" (m)", s.l)}
      ${fieldNum("c_w", t("c_width")+" (m)", s.w)}
      ${fieldNum("c_layers", t("c_layers"), s.layers, "1")}
    </div>
    ${fieldNum("c_fabric", t("c_fabric"), s.fabric, "1")}
    <div class="plate"><div class="item"><div class="l">${t("c_result")}</div><div class="v" id="c_out">--</div></div></div>
  </div>`;
  replaceCalc("calc-composite", el.firstElementChild);
  document.getElementById("c_fiber").onchange = e=>{ s.fiber=e.target.value; computeComposite(); };
  document.getElementById("c_l").oninput = e=>{ s.l=parseFloat(e.target.value)||0; computeComposite(); };
  document.getElementById("c_w").oninput = e=>{ s.w=parseFloat(e.target.value)||0; computeComposite(); };
  document.getElementById("c_layers").oninput = e=>{ s.layers=parseFloat(e.target.value)||0; computeComposite(); };
  document.getElementById("c_fabric").oninput = e=>{ s.fabric=parseFloat(e.target.value)||0; computeComposite(); };
  computeComposite();
}
function computeComposite(){
  const s = state.c;
  const ratio = {csm:2.5, plain:1.2, biaxial:1.5, roving:2.0}[s.fiber];
  const area = s.l*s.w*s.layers;
  const fiberKg = area*s.fabric/1000;
  const resinKg = fiberKg*ratio;
  const resinL = resinKg/1.1;
  document.getElementById("c_out").textContent = lToDisp(resinL).toFixed(1) + " " + lUnitLabel();
}

function renderPipe(){
  const el = document.createElement("div");
  el.innerHTML = `
  <div class="calc" id="calc-pipe">
    <h2>${t("pipe_title")}</h2>
    <p class="desc">${t("pipe_desc")}</p>
    <div class="row2">
      <div class="field"><label>${t("pipe_standard")}</label>
        <select id="pipe_standard"><option value="ks">KS/JIS</option><option value="asme">ASME (NPS)</option></select></div>

    </div>

  </div>`;

  document.getElementById("pipe_standard").onchange = fillPipeSizes;
  fillPipeSizes();
}
function fillPipeSizes(){
  const std = document.getElementById("pipe_standard").value;
  const sizeSel = document.getElementById("pipe_size");
  const list = std==="ks" ? PIPE_KS : PIPE_ASME;
  sizeSel.innerHTML = list.map((row,i)=>`<option value="${i}">${row[0]}</option>`).join("");
  sizeSel.onchange = renderPipeResult;
  renderPipeResult();
}
function renderPipeResult(){
  const std = document.getElementById("pipe_standard").value;
  const idx = parseInt(document.getElementById("pipe_size").value||0);
  const plate = document.getElementById("pipe_plate");
  if(std==="ks"){
    const row = PIPE_KS[idx];
    plate.innerHTML = `<div class="item"><div class="l">${t("pipe_od")}</div><div class="v">${row[1].toFixed(1)} mm</div></div>`;
  } else {
    const row = PIPE_ASME[idx];
    plate.innerHTML = `<div class="item"><div class="l">${t("pipe_od")}</div><div class="v">${row[1].toFixed(1)} mm</div></div>
      <div class="item"><div class="l">${t("pipe_t40")}</div><div class="v">${row[2].toFixed(2)} mm</div></div>
      <div class="item"><div class="l">${t("pipe_t80")}</div><div class="v">${row[3].toFixed(2)} mm</div></div>`;
  }
}

function renderProp(){
  const s = state.pp;
  const el = document.createElement("div");
  el.innerHTML = `
  <div class="calc" id="calc-prop">
    <h2>${t("pp_title")}</h2>
    <p class="desc">${t("pp_desc")}</p>
    <div class="row3">
      ${fieldNum("pp_pitch", t("pp_pitch"), s.pitch)}
      ${fieldNum("pp_dia", t("pp_dia"), s.dia)}
      ${fieldNum("pp_rpm", t("pp_rpm"), s.rpm, "10")}
    </div>
    <div class="row2">
      ${fieldNum("pp_gear", t("pp_gear"), s.gear, "0.1")}
      ${fieldNum("pp_slip", t("pp_slip"), s.slip, "1")}
    </div>
    <div class="plate">
      <div class="item"><div class="l">${t("pp_theo")}</div><div class="v" id="pp_theo_out">--</div></div>
      <div class="item"><div class="l">${t("pp_actual")}</div><div class="v" id="pp_actual_out">--</div></div>
    </div>
  </div>`;
  replaceCalc("calc-prop", el.firstElementChild);
  document.getElementById("pp_pitch").oninput = e=>{ s.pitch=parseFloat(e.target.value)||0; computeProp(); };
  document.getElementById("pp_dia").oninput = e=>{ s.dia=parseFloat(e.target.value)||0; computeProp(); };
  document.getElementById("pp_rpm").oninput = e=>{ s.rpm=parseFloat(e.target.value)||0; computeProp(); };
  document.getElementById("pp_gear").oninput = e=>{ s.gear=parseFloat(e.target.value)||0; computeProp(); };
  document.getElementById("pp_slip").oninput = e=>{ s.slip=parseFloat(e.target.value)||0; computeProp(); };
  computeProp();
}
function computeProp(){
  const s = state.pp;
  const theo = s.gear>0 ? (s.pitch*s.rpm)/(s.gear*1215.2) : 0;
  const actual = theo*(1-s.slip/100);
  document.getElementById("pp_theo_out").textContent = theo.toFixed(1) + " kn";
  document.getElementById("pp_actual_out").textContent = actual.toFixed(1) + " kn";
}

function renderWood(){
  const s = state.w;

  el.innerHTML = `
  <div class="calc" id="calc-wood">
    <h2>${t("w_title")}</h2>
    <p class="desc">${t("w_desc")}</p>
    <div class="field"><label>${t("w_species")}</label>
      <select id="w_species">
        <option value="okoume" ${s.species==="okoume"?"selected":""}>Marine Plywood (Okoume)</option>
        <option value="meranti" ${s.species==="meranti"?"selected":""}>Marine Plywood (Meranti)</option>
        <option value="teak" ${s.species==="teak"?"selected":""}>Teak</option>
        <option value="mahogany" ${s.species==="mahogany"?"selected":""}>Mahogany</option>
        <option value="oak" ${s.species==="oak"?"selected":""}>Oak</option>
        <option value="pine" ${s.species==="pine"?"selected":""}>Pine</option>
      </select></div>
    <div class="row3">
      ${fieldNum("w_l", t("lbl_l")+" ("+mmUnitLabel()+")", mmToDisp(s.l).toFixed(1))}
      ${fieldNum("w_w", t("lbl_w")+" ("+mmUnitLabel()+")", mmToDisp(s.w).toFixed(1))}
      ${fieldNum("w_t", t("lbl_t")+" ("+mmUnitLabel()+")", mmToDisp(s.thick).toFixed(2))}
    </div>
    ${fieldNum("w_qty", t("lbl_qty"), s.qty, "1")}
    <div class="plate"><div class="item"><div class="l">${t("lbl_weight")}</div><div class="v" id="w_out">--</div></div></div>
  </div>`;
  replaceCalc("calc-wood", el.firstElementChild);
  document.getElementById("w_species").onchange = e=>{ s.species=e.target.value; computeWood(); };
  document.getElementById("w_l").oninput = e=>{ s.l=dispToMm(parseFloat(e.target.value)||0); computeWood(); };
  document.getElementById("w_w").oninput = e=>{ s.w=dispToMm(parseFloat(e.target.value)||0); computeWood(); };
  document.getElementById("w_t").oninput = e=>{ s.thick=dispToMm(parseFloat(e.target.value)||0); computeWood(); };
  document.getElementById("w_qty").oninput = e=>{ s.qty=parseFloat(e.target.value)||0; computeWood(); };
  computeWood();
}
function computeWood(){
  const s = state.w;
  const density = {okoume:400, meranti:650, teak:655, mahogany:640, oak:750, pine:500}[s.species];
  const kg = (s.l*s.w*s.thick*density/1000000000)*s.qty;
  document.getElementById("w_out").textContent = kgToDisp(kg).toFixed(2) + " " + kgUnitLabel();
}

  const s = state.a;

  <div class="calc" id="calc-anchor">
    <h2>${t("a_title")}</h2>
    <p class="desc">${t("a_desc")}</p>

      ${fieldNum("a_disp", t("a_disp"), s.disp, "10")}

  document.getElementById("a_disp").oninput = e=>{ s.disp=parseFloat(e.target.value)||0; computeAnchor(); };
  document.getElementById("a_b").oninput = e=>{ s.b=parseFloat(e.target.value)||0; computeAnchor(); };
  document.getElementById("a_h").oninput = e=>{ s.h=parseFloat(e.target.value)||0; computeAnchor(); };

  const s = state.a;

}
